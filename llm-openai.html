<script type="text/javascript">
  RED.nodes.registerType('langchain-chat-model', {
    category: 'langchain',
    color: '#c2efaa',
    defaults: {
      name: { value: '' },
      configNode: { value: '', type: 'langchain-config', required: true },
      modelOverride: { value: '' },
      temperatureOverride: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-comments-o',
    label: function () {
      return this.name || 'chat model';
    }
  });
</script>

<script type="text/x-red" data-template-name="langchain-chat-model">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-configNode"><i class="fa fa-server"></i> Config</label>
    <input type="text" id="node-input-configNode">
  </div>
  <div class="form-row">
    <label for="node-input-modelOverride"><i class="fa fa-cube"></i> Model override</label>
    <input type="text" id="node-input-modelOverride" placeholder="(uses config)">
  </div>
  <div class="form-row">
    <label for="node-input-temperatureOverride"><i class="fa fa-thermometer-half"></i> Temperature override</label>
    <input type="text" id="node-input-temperatureOverride" placeholder="(uses config)">
  </div>
</script>
